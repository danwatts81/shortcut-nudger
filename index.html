<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Next Ticket — Shortcut Nudger</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --border: #2a2f3a;
    --text: #e7e9ee;
    --muted: #9aa2b1;
    --accent: #6c8cff;
    --accent-2: #4f6fe0;
    --urgent: #ff5c7a;
    --urgent-bg: #2a1620;
    --ok: #46d18b;
    --radius: 14px;
    --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 28px 20px 64px;
  }

  header.app {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px 16px;
    margin-bottom: 20px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 11px;
  }
  .brand .logo {
    flex: 0 0 auto;
    width: 30px;
    height: 30px;
    display: block;
  }
  .brand .logo .mark { fill: var(--accent); }
  .brand .wordmark {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }
  .brand .name {
    font-size: 19px;
    font-weight: 700;
    letter-spacing: 0.2px;
    color: var(--text);
  }
  .brand .name .dot { color: var(--accent); }
  .brand .subtitle {
    font-size: 11.5px;
    letter-spacing: 0.9px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    margin-top: 2px;
  }

  .meta {
    color: var(--muted);
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .meta b { color: var(--text); font-weight: 600; }

  button {
    font: inherit;
    color: var(--text);
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    cursor: pointer;
    transition: border-color .15s, background .15s, transform .05s;
  }
  button:hover { border-color: var(--accent); }
  button:active { transform: translateY(1px); }
  button.primary {
    background: var(--accent-2);
    border-color: var(--accent-2);
    color: #fff;
    font-weight: 600;
  }
  button.primary:hover { background: var(--accent); border-color: var(--accent); }
  button.ghost { background: transparent; }
  button.tiny { padding: 5px 10px; font-size: 13px; border-radius: 8px; }

  a { color: var(--accent); }

  /* ---- Setup card ---- */
  .setup {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: var(--shadow);
    max-width: 520px;
    margin: 40px auto;
  }
  .setup h2 { margin: 0 0 8px; font-size: 18px; }
  .setup p { color: var(--muted); margin: 0 0 18px; }
  .setup label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .field { display: flex; gap: 8px; }
  input[type="password"], input[type="text"], select {
    flex: 1;
    font: inherit;
    color: var(--text);
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    min-width: 0;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  .hint { font-size: 12.5px; color: var(--muted); margin-top: 12px; }

  /* ---- Next card ---- */
  .next-card {
    position: relative;
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 22px 20px;
    box-shadow: var(--shadow);
    margin-bottom: 26px;
  }
  .next-card.is-urgent {
    border-color: var(--urgent);
    box-shadow: 0 10px 30px rgba(255, 92, 122, 0.18);
  }
  .kicker {
    font-size: 12px;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 10px;
  }
  .next-card.is-urgent .kicker { color: var(--urgent); }
  .story-name { font-size: 22px; font-weight: 700; margin: 0 0 6px; line-height: 1.3; }
  .story-id { color: var(--muted); font-size: 13px; margin-bottom: 14px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

  .labels { display: flex; gap: 6px; flex-wrap: wrap; }
  .label {
    font-size: 12px;
    padding: 3px 9px;
    border-radius: 999px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .label.urgent {
    background: var(--urgent-bg);
    border-color: var(--urgent);
    color: var(--urgent);
    font-weight: 600;
  }

  /* ---- Timing badges (FT-3/FT-4) ---- */
  .badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge {
    font-size: 11.5px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .badge.stale {
    background: var(--urgent-bg);
    border-color: var(--urgent);
    color: var(--urgent);
    font-weight: 600;
  }

  /* ---- Queue list ---- */
  .section-title {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin: 0 0 12px;
  }
  ul.queue { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
  ul.queue li {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
  }
  ul.queue li .rank { color: var(--muted); font-variant-numeric: tabular-nums; width: 22px; text-align: right; }
  ul.queue li .qname { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  ul.queue li.urgent { border-color: var(--urgent); }
  ul.queue li a { text-decoration: none; }

  .empty {
    background: var(--panel);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 40px 22px;
    text-align: center;
    color: var(--muted);
  }
  .empty .big { font-size: 40px; margin-bottom: 8px; }

  /* ---- Controls row: mode toggle + member switcher (FT-1/FT-2) ---- */
  .controls {
    display: flex;
    align-items: center;
    gap: 12px 16px;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }
  .mode-toggle { display: inline-flex; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .mode-toggle button {
    border: none;
    border-radius: 0;
    background: var(--panel);
    color: var(--muted);
    padding: 8px 14px;
  }
  .mode-toggle button + button { border-left: 1px solid var(--border); }
  .mode-toggle button.active { background: var(--accent-2); color: #fff; font-weight: 600; }
  .mode-toggle button:hover:not(.active) { color: var(--text); }

  .switcher { display: inline-flex; align-items: center; gap: 8px; }
  .switcher select { flex: 0 1 220px; padding: 8px 10px; }
  .viewing-hint { color: var(--muted); font-size: 12.5px; }
  .viewing-hint b { color: var(--text); }
  .viewing-hint .reset { margin-left: 8px; }

  /* ---- Team Manager (FT-2) ---- */
  .team-section { margin-bottom: 26px; }
  .team-section > h3 {
    font-size: 14px;
    margin: 0 0 12px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .team-section > h3 .count { color: var(--muted); font-size: 12px; font-weight: 400; }
  .member-row {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .member-row .who { font-weight: 600; margin-bottom: 8px; }
  .member-row .who .mention { color: var(--muted); font-weight: 400; font-size: 12.5px; margin-left: 6px; }
  .nn { display: flex; gap: 10px; align-items: baseline; margin-bottom: 6px; flex-wrap: wrap; }
  .nn .tag {
    font-size: 10.5px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--accent);
    flex: 0 0 auto;
    width: 42px;
  }
  .nn.next-line .tag { color: var(--muted); }
  .nn .item { flex: 1; min-width: 0; }
  .nn .item .iname { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .nn .item a { text-decoration: none; }
  .nn.urgent .tag { color: var(--urgent); }
  .more-toggle {
    background: transparent;
    border: none;
    color: var(--accent);
    padding: 2px 0;
    font-size: 12.5px;
    cursor: pointer;
  }
  .more-toggle:hover { text-decoration: underline; }
  .mini-queue { margin-top: 8px; }
  .idle-line { color: var(--muted); font-size: 12.5px; padding: 4px 2px; }

  .banner {
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 18px;
    font-size: 14px;
    display: none;
  }
  .banner.error { display: block; background: #2a1620; border: 1px solid var(--urgent); color: #ffb3c2; }

  .muted { color: var(--muted); }
  .spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  footer { margin-top: 40px; text-align: center; color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <div class="brand">
      <svg class="logo" viewBox="0 0 32 32" role="img" aria-label="Shortcut Nudger logo" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path class="mark" d="M17.6 2.3a1.4 1.4 0 0 0-2.4 1V13H4.9a1.4 1.4 0 0 0-1 2.4l11.5 11.9a1.4 1.4 0 0 0 2.4-1V17h10.3a1.4 1.4 0 0 0 1-2.4L17.6 2.3Z"/>
      </svg>
      <span class="wordmark">
        <span class="name">Shortcut Nudger <span class="dot">●</span></span>
        <span class="subtitle">Next Ticket</span>
      </span>
    </div>
    <div class="meta" id="metaBar"></div>
  </header>

  <div id="banner" class="banner"></div>
  <main id="app"></main>

  <footer>
    Shortcut Nudger · target column = right-most <b id="footPrefix"></b>* · urgent label = <b id="footUrgent"></b>
    · <a href="#" id="resetToken">reset token</a>
    · <span id="appVersion"></span>
  </footer>
</div>

<script>
/* ============================================================================
 * CONFIG — tweak these to change behaviour. No build step, no dependencies.
 * ========================================================================== */
const CONFIG = {
  VERSION: "1.0.0",           // app version shown in footer; bump by hand per release
  COLUMN_PREFIX: "Dev",       // FALLBACK SEED ONLY — used to seed the role when nothing is detected/stored.
                              //   Live targets now come from detected roles (Story 3/4), not this key.
  URGENT_LABEL: "urgent",     // stories carrying this label jump the queue
  POLL_MS: 30000,             // auto-refresh interval (ms)
  STALE_DAYS: 3,              // a ticket sat this many days in its column gets the "stale" highlight
  API_BASE: "https://api.app.shortcut.com/api/v3",
  TOKEN_KEY: "shortcut_nudger_token",
  VIEW_MEMBER_KEY: "shortcut_nudger_view_member", // persists the member whose queue you're viewing (FT-1)
  MODE_KEY: "shortcut_nudger_mode",               // persists "me" | "team" view mode (FT-2)
  ROLE_KEY: "shortcut_nudger_role",               // persists the selected global role (Story 3)
  MEMBER_ROLES_KEY: "shortcut_nudger_member_roles", // persists per-member role assignments (Story 4)
};

/* ============================================================================
 * PURE LOGIC — no DOM, no network. Reusable verbatim by a future Tampermonkey
 * overlay. Fully unit-testable.
 * ========================================================================== */

/**
 * Board convention: workflow state names are `Role (Stage)`, e.g. "Dev (Ready)",
 * "QA (Active)". The role is group 1 (trimmed). States that don't match this
 * pattern (Inbox / Backlog / Completed) are ignored by role detection.
 */
const ROLE_STATE_RE = /^(.+?)\s*\(([^)]+)\)\s*$/;

/**
 * Pick the target workflow state: the right-most (highest position) state,
 * across all workflows, whose name starts with `prefix` (case-insensitive),
 * excluding "done"-type (completed) states.
 * @returns {object|null} the chosen state, or null if none match.
 */
function pickTargetState(workflows, prefix) {
  const p = prefix.toLowerCase();
  const candidates = [];
  for (const wf of workflows || []) {
    for (const st of wf.states || []) {
      const name = (st.name || "").toLowerCase();
      if (name.startsWith(p) && st.type !== "done") {
        candidates.push({ ...st, workflow_id: wf.id, workflow_name: wf.name });
      }
    }
  }
  if (candidates.length === 0) return null;
  // Right-most = highest board position.
  candidates.sort((a, b) => (b.position ?? 0) - (a.position ?? 0));
  return candidates[0];
}

/**
 * Scan every workflow state name for the `Role (Stage)` pattern, collect the
 * distinct role names, and compute each role's target state via the existing
 * pickTargetState() (reusing its right-most/non-done logic). Roles whose target
 * is null (only done-type states) are excluded.
 * @returns {{ roles: string[], byRole: Map<string, object> }} roles sorted A→Z.
 */
function detectRoles(workflows) {
  const names = new Set();
  for (const wf of workflows || []) {
    for (const st of wf.states || []) {
      const m = ROLE_STATE_RE.exec(st.name || "");
      if (m) names.add(m[1].trim());
    }
  }
  const byRole = new Map();
  for (const role of names) {
    const target = pickTargetState(workflows, role); // reuse right-most/non-done logic
    if (target) byRole.set(role, target);
  }
  const roles = [...byRole.keys()].sort((a, b) => a.localeCompare(b));
  return { roles, byRole };
}

/**
 * Resolve the array of target state objects for a selected role.
 *  - A normal role → [byRole.get(role)] (empty if unknown/null).
 *  - "Planner" → every role's target, deduped by state id.
 * @returns {object[]}
 */
function resolveTargets(detected, roleName) {
  const byRole = (detected && detected.byRole) || new Map();
  if (roleName === "Planner") {
    const seen = new Map();
    for (const st of byRole.values()) {
      if (st && !seen.has(st.id)) seen.set(st.id, st);
    }
    return [...seen.values()];
  }
  const st = byRole.get(roleName);
  return st ? [st] : [];
}

/**
 * Build a stateRank map `{ [stateId]: rank }` from an array of target state
 * objects, ranking by ascending board `position`. Used for cross-column sorting
 * when a pick spans multiple columns (Planner / mixed-role team). Pure.
 * @returns {Object<string|number, number>}
 */
function stateRankFromTargets(targets) {
  const rank = {};
  (targets || [])
    .slice()
    .sort((a, b) => (a.position ?? 0) - (b.position ?? 0))
    .forEach((st, i) => { if (st) rank[st.id] = i; });
  return rank;
}

/** True if a story carries the urgent label (case-insensitive name match). */
function hasUrgentLabel(story, urgentLabel) {
  const target = urgentLabel.toLowerCase();
  const labels = story.labels || [];
  return labels.some((l) => (l.name || "").toLowerCase() === target);
}

/**
 * Rank the stories owned by me across one OR MORE target columns.
 * Rule: urgent first, then (when a stateRank map is supplied) by column rank,
 * then top-to-bottom by per-column board position.
 * @param {object[]} stories
 * @param {number} myId
 * @param {(number|number[]|Set<number>)} targetStateIds - single id, array, or Set.
 * @param {string} urgentLabel
 * @param {Object<string|number, number>} [stateRank] - `{ [stateId]: rank }`. When
 *   absent/single-column, sorting falls back to (urgent, position) — unchanged
 *   single-column behavior.
 * @returns {{ next: object|null, queue: object[], all: object[] }}
 */
function pickNext(stories, myId, targetStateIds, urgentLabel, stateRank) {
  // Normalize the target id(s) to a Set (accept single id, array, or Set).
  const idSet =
    targetStateIds instanceof Set
      ? targetStateIds
      : new Set(Array.isArray(targetStateIds) ? targetStateIds : [targetStateIds]);
  const hasRank = stateRank && Object.keys(stateRank).length > 0;

  const mine = (stories || []).filter(
    (s) =>
      Array.isArray(s.owner_ids) &&
      s.owner_ids.includes(myId) &&
      idSet.has(s.workflow_state_id) &&
      !s.archived &&
      !s.completed
  );

  const sorted = mine.slice().sort((a, b) => {
    const ua = hasUrgentLabel(a, urgentLabel) ? 1 : 0;
    const ub = hasUrgentLabel(b, urgentLabel) ? 1 : 0;
    if (ua !== ub) return ub - ua;                 // urgent first
    if (hasRank) {                                  // cross-column: order by column rank
      const ra = stateRank[a.workflow_state_id] ?? 0;
      const rb = stateRank[b.workflow_state_id] ?? 0;
      if (ra !== rb) return ra - rb;
    }
    return (a.position ?? 0) - (b.position ?? 0);   // then top-to-bottom within a column
  });

  return { next: sorted[0] || null, queue: sorted.slice(1), all: sorted };
}

/**
 * Compact, human elapsed time from an ISO timestamp to `nowMs`.
 * Buckets: <60s "just now"; <60m "Nm"; <24h "Nh"; else "Nd".
 * `nowMs` is injected so this stays pure and unit-testable.
 * @returns {string|null} formatted string, or null for missing/unparseable input.
 */
function formatDuration(fromISO, nowMs) {
  if (!fromISO) return null;
  const then = Date.parse(fromISO);
  if (Number.isNaN(then)) return null;
  const ms = Math.max(0, nowMs - then);
  const sec = Math.floor(ms / 1000);
  if (sec < 60) return "just now";
  const min = Math.floor(sec / 60);
  if (min < 60) return `${min}m`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}h`;
  const days = Math.floor(hr / 24);
  return `${days}d`;
}

/** Whole days elapsed from an ISO timestamp to `nowMs` (0 if missing/invalid). */
function daysSince(fromISO, nowMs) {
  if (!fromISO) return 0;
  const then = Date.parse(fromISO);
  if (Number.isNaN(then)) return 0;
  return Math.floor(Math.max(0, nowMs - then) / 86400000);
}

/**
 * Format a Date as "YYYY-MM-DD HH:MM" (24-hour, no seconds), for the build stamp
 * derived from `document.lastModified`. Returns "unknown" for an invalid Date.
 * @param {Date} date
 * @returns {string}
 */
function formatBuildStamp(date) {
  if (!(date instanceof Date) || Number.isNaN(date.getTime())) return "unknown";
  const pad = (n) => String(n).padStart(2, "0");
  const Y = date.getFullYear();
  const M = pad(date.getMonth() + 1);
  const D = pad(date.getDate());
  const h = pad(date.getHours());
  const m = pad(date.getMinutes());
  return `${Y}-${M}-${D} ${h}:${m}`;
}

/* ============================================================================
 * API MODULE — thin wrappers over the Shortcut REST API.
 *
 * CORS note: we authenticate with the `?token=` query parameter, NOT the
 * `Shortcut-Token` header. A custom request header would force the browser to
 * send a CORS *preflight* (OPTIONS) request, which Shortcut answers with a bare
 * 401 and no `Access-Control-Allow-Origin` — killing the call. Passing the token
 * as a query param keeps every request a "simple" CORS request (no preflight),
 * which is the path Shortcut echoes the browser's Origin back on. So these run
 * straight from the browser with no backend/proxy.
 * ========================================================================== */

const API_ORIGIN = new URL(CONFIG.API_BASE).origin;

function withToken(rawUrl, token) {
  const u = new URL(rawUrl);
  u.searchParams.set("token", token);
  return u.toString();
}

async function apiFetch(pathOrUrl, token) {
  const base = pathOrUrl.startsWith("http")
    ? pathOrUrl
    : pathOrUrl.startsWith("/api/")
      ? API_ORIGIN + pathOrUrl
      : CONFIG.API_BASE + pathOrUrl;

  // No custom headers → simple request → no preflight.
  const res = await fetch(withToken(base, token));

  if (res.status === 401 || res.status === 403) {
    const err = new Error("Token rejected (401/403). Check that your API token is valid.");
    err.code = "AUTH";
    throw err;
  }
  if (!res.ok) {
    const body = await res.text().catch(() => "");
    throw new Error(`Shortcut API ${res.status}: ${body.slice(0, 200) || res.statusText}`);
  }
  return res.json();
}

/** Current member tied to the token → identity, no name entry needed. */
async function getMember(token) {
  const m = await apiFetch("/member", token);
  return {
    id: m.id,
    name: m.name || m.profile?.name || m.mention_name || "you",
    mention_name: m.mention_name || m.profile?.mention_name || "",
  };
}

/** All active (non-disabled) members, `{ id, name, mention_name }`, sorted by name. */
async function getMembers(token) {
  const raw = await apiFetch("/members", token);
  return (raw || [])
    .filter((m) => !m.disabled)
    .map((m) => ({
      id: m.id,
      name: m.profile?.name || m.profile?.mention_name || "unknown",
      mention_name: m.profile?.mention_name || "",
    }))
    .sort((a, b) => a.name.localeCompare(b.name));
}

/** All active (non-archived) teams/groups, `{ id, name, member_ids }`. */
async function getGroups(token) {
  const raw = await apiFetch("/groups", token);
  return (raw || [])
    .filter((g) => !g.archived)
    .map((g) => ({
      id: g.id,
      name: g.name || "Team",
      member_ids: Array.isArray(g.member_ids) ? g.member_ids : [],
    }));
}

async function getWorkflows(token) {
  return apiFetch("/workflows", token);
}

/**
 * Search stories via the operator-based search endpoint, following the `next`
 * cursor to gather every page. We query broadly (by owner + state) and then
 * filter precisely client-side in pickNext(), so an imperfect query can't
 * corrupt the ranking.
 */
async function searchStories(token, query) {
  const out = [];
  let path = `/search/stories?page_size=25&query=${encodeURIComponent(query)}`;
  let guard = 0;
  while (path && guard++ < 40) {
    const page = await apiFetch(path, token);
    if (Array.isArray(page.data)) out.push(...page.data);
    path = page.next || null; // `next` is a relative /api/v3/... path or null
  }
  return out;
}

/* ============================================================================
 * STATE + RENDER
 * ========================================================================== */

const app = document.getElementById("app");
const metaBar = document.getElementById("metaBar");
const bannerEl = document.getElementById("banner");
let pollTimer = null;
let state = {
  tokenMember: null,   // the token owner (identity / "reset to me")
  viewMember: null,    // whose queue is shown in personal mode (defaults to tokenMember)
  mode: "me",          // "me" | "team"
  members: [],         // cached member lookup (fetched once per boot)
  groups: [],          // cached team lookup (fetched once per boot)
  target: null,        // representative target state (for meta display)
  detectedRoles: { roles: [], byRole: new Map() }, // detectRoles() result (Story 3)
  role: "",            // selected global role (Story 3)
  stateRank: {},       // cross-column rank cache for the active target set
  memberRoles: {},     // { memberId: role } per-person overrides (Story 4)
  lastRefreshed: null,
  loading: false,
};

function getToken() { return localStorage.getItem(CONFIG.TOKEN_KEY) || ""; }
function setToken(t) { localStorage.setItem(CONFIG.TOKEN_KEY, t.trim()); }
function clearToken() { localStorage.removeItem(CONFIG.TOKEN_KEY); }

function getStoredViewMemberId() { return localStorage.getItem(CONFIG.VIEW_MEMBER_KEY) || ""; }
function setStoredViewMemberId(id) { localStorage.setItem(CONFIG.VIEW_MEMBER_KEY, String(id)); }

function getStoredMode() {
  const m = localStorage.getItem(CONFIG.MODE_KEY);
  return m === "team" ? "team" : "me";
}
function setStoredMode(m) { localStorage.setItem(CONFIG.MODE_KEY, m); }

function getStoredRole() { return localStorage.getItem(CONFIG.ROLE_KEY) || ""; }
function setStoredRole(r) { localStorage.setItem(CONFIG.ROLE_KEY, String(r)); }

function getStoredMemberRoles() {
  try {
    const obj = JSON.parse(localStorage.getItem(CONFIG.MEMBER_ROLES_KEY) || "{}");
    return obj && typeof obj === "object" ? obj : {};
  } catch { return {}; }
}
function setStoredMemberRoles(obj) {
  localStorage.setItem(CONFIG.MEMBER_ROLES_KEY, JSON.stringify(obj || {}));
}

/** Column-label text for the active role: role name → its resolved column(s). */
function roleColumnLabel(roleName) {
  const targets = resolveTargets(state.detectedRoles, roleName);
  if (roleName === "Planner") return `Planner (${targets.length} columns)`;
  if (!targets.length) return roleName || "?";
  return targets.map((t) => t.name).join(", ");
}

function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
  );
}

function showError(msg) {
  bannerEl.textContent = msg;
  bannerEl.className = "banner error";
}
function clearError() { bannerEl.className = "banner"; bannerEl.textContent = ""; }

function labelChips(story) {
  const labels = story.labels || [];
  if (!labels.length) return "";
  return `<div class="labels">${labels
    .map((l) => {
      const urg = (l.name || "").toLowerCase() === CONFIG.URGENT_LABEL.toLowerCase();
      return `<span class="label${urg ? " urgent" : ""}">${esc(l.name)}</span>`;
    })
    .join("")}</div>`;
}

function storyIdLabel(s) {
  return s.id != null ? `sc-${s.id}` : "";
}

/**
 * Timing chips for a story: how long it's sat in its current column
 * (moved_at, falling back to created_at) and how long since anything changed
 * (updated_at). In-state chip gets the `stale` class past CONFIG.STALE_DAYS.
 * @returns {string} HTML (possibly empty).
 */
function timingBadges(story, nowMs) {
  const inState = formatDuration(story.moved_at || story.created_at, nowMs);
  const touched = formatDuration(story.updated_at, nowMs);
  const chips = [];
  if (inState) {
    const stale = daysSince(story.moved_at || story.created_at, nowMs) >= CONFIG.STALE_DAYS;
    chips.push(`<span class="badge${stale ? " stale" : ""}" title="Time in current column">⏱ in state ${esc(inState)}</span>`);
  }
  if (touched) {
    const suffix = touched === "just now" ? "" : " ago";
    chips.push(`<span class="badge" title="Time since last change">✎ updated ${esc(touched)}${suffix}</span>`);
  }
  if (!chips.length) return "";
  return `<div class="badges">${chips.join("")}</div>`;
}

function renderMeta() {
  if (!state.tokenMember) { metaBar.innerHTML = ""; return; }
  const t = state.lastRefreshed
    ? new Date(state.lastRefreshed).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" })
    : "—";
  const roleLabel = state.role || "?";
  const colLabel = roleColumnLabel(state.role);
  metaBar.innerHTML = `
    <span>role <b>${esc(roleLabel)}</b></span>
    <span><b>${esc(state.tokenMember.name)}</b></span>
    <span>column <b>${esc(colLabel)}</b></span>
    <span>updated <b>${t}</b>${state.loading ? ' <span class="spin">↻</span>' : ""}</span>
    <button class="tiny ghost" id="refreshBtn">Refresh</button>
  `;
  const rb = document.getElementById("refreshBtn");
  if (rb) rb.onclick = () => refresh(true);

  // Keep the footer's "target column" reflecting the selected role (re-runs on
  // every meta render, i.e. after every role change / refresh).
  const fp = document.getElementById("footPrefix");
  if (fp) fp.textContent = state.role || CONFIG.COLUMN_PREFIX;
}

/**
 * Controls row: mode toggle (My Queue / Team Manager) and, in personal mode,
 * a member switcher + "viewing someone else" hint. Returns HTML; call
 * wireControls() after inserting it into the DOM.
 */
function controlsHtml() {
  if (!state.tokenMember) return "";
  const modeToggle = `
    <div class="mode-toggle">
      <button data-mode="me" class="${state.mode === "me" ? "active" : ""}">My Queue</button>
      <button data-mode="team" class="${state.mode === "team" ? "active" : ""}">Team Manager</button>
    </div>`;

  // Role picker: detected concrete roles + "Planner" (all columns).
  const roleOptions = [...state.detectedRoles.roles, "Planner"]
    .map((r) => `<option value="${esc(r)}"${r === state.role ? " selected" : ""}>${esc(r)}</option>`)
    .join("");
  const roleSelect = `
    <div class="switcher">
      <label for="roleSelect" class="viewing-hint">Role</label>
      <select id="roleSelect">${roleOptions}</select>
    </div>`;

  let switcher = "";
  if (state.mode === "me" && state.members.length) {
    const opts = state.members
      .map((m) => {
        const sel = state.viewMember && m.id === state.viewMember.id ? " selected" : "";
        const you = m.id === state.tokenMember.id ? " (you)" : "";
        return `<option value="${esc(m.id)}"${sel}>${esc(m.name)}${you}</option>`;
      })
      .join("");
    switcher = `
      <div class="switcher">
        <label for="memberSelect" class="viewing-hint">Viewing</label>
        <select id="memberSelect">${opts}</select>
      </div>`;
    if (state.viewMember && state.viewMember.id !== state.tokenMember.id) {
      switcher += `<span class="viewing-hint">Viewing <b>${esc(state.viewMember.name)}</b> (not you)<a href="#" class="reset" id="resetMe">reset to me</a></span>`;
    }
  }
  return `<div class="controls">${modeToggle}${roleSelect}${switcher}</div>`;
}

function wireControls() {
  document.querySelectorAll(".mode-toggle button[data-mode]").forEach((btn) => {
    btn.onclick = () => {
      const m = btn.getAttribute("data-mode");
      if (m === state.mode) return;
      state.mode = m;
      setStoredMode(m);
      refresh(true);
    };
  });
  const roleSel = document.getElementById("roleSelect");
  if (roleSel) {
    roleSel.onchange = () => {
      state.role = roleSel.value;
      setStoredRole(state.role);
      refresh(true);
    };
  }
  const sel = document.getElementById("memberSelect");
  if (sel) {
    sel.onchange = () => {
      const m = state.members.find((x) => String(x.id) === sel.value);
      if (m) { state.viewMember = m; setStoredViewMemberId(m.id); refresh(true); }
    };
  }
  const reset = document.getElementById("resetMe");
  if (reset) {
    reset.onclick = (e) => {
      e.preventDefault();
      state.viewMember = state.tokenMember;
      setStoredViewMemberId(state.tokenMember.id);
      refresh(true);
    };
  }
}

function renderSetup(prefillError) {
  stopPolling();
  state.tokenMember = null;
  renderMeta();
  app.innerHTML = `
    <div class="setup">
      <h2>Connect your Shortcut account</h2>
      <p>Paste your personal Shortcut API token. It's stored only in this browser
         (localStorage) and sent straight to Shortcut — never to any other server.</p>
      <label for="tokenInput">Shortcut API token</label>
      <div class="field">
        <input type="password" id="tokenInput" placeholder="e.g. 5f2b…" autocomplete="off" spellcheck="false" />
        <button class="primary" id="saveToken">Save</button>
      </div>
      <div class="hint">
        Get a token at
        <a href="https://app.shortcut.com/settings/account/api-tokens" target="_blank" rel="noopener">
          Settings → API Tokens</a>. Your identity (which tickets are "yours") is detected automatically from the token.
      </div>
    </div>
  `;
  if (prefillError) showError(prefillError);
  const input = document.getElementById("tokenInput");
  const save = () => {
    const v = input.value.trim();
    if (!v) { input.focus(); return; }
    setToken(v);
    clearError();
    boot();
  };
  document.getElementById("saveToken").onclick = save;
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") save(); });
  input.focus();
}

function renderResult(next, queue, targetState, nowMs) {
  const urgent = next && hasUrgentLabel(next, CONFIG.URGENT_LABEL);
  const viewingOther = state.viewMember && state.tokenMember && state.viewMember.id !== state.tokenMember.id;
  const whose = viewingOther ? `${esc(state.viewMember.name)}'s` : "your";

  let html = controlsHtml();

  if (!next) {
    const colText = roleColumnLabel(state.role);
    html += `
      <div class="empty">
        <div class="big">🎉</div>
        <div>Nothing assigned to ${viewingOther ? `<b>${esc(state.viewMember.name)}</b>` : "you"} in <b>${esc(colText)}</b>.</div>
        <div class="muted" style="margin-top:6px">${viewingOther ? "Their column is clear." : "Enjoy the breather — or grab something from the board."}</div>
      </div>`;
    app.innerHTML = html;
    wireControls();
    return;
  }

  html += `
    <div class="next-card${urgent ? " is-urgent" : ""}">
      <div class="kicker">${urgent ? "🔥 Urgent — work on this next" : "Work on this next"}</div>
      <h2 class="story-name">${esc(next.name)}</h2>
      <div class="story-id">${esc(storyIdLabel(next))}</div>
      ${timingBadges(next, nowMs)}
      <div class="row" style="justify-content:space-between; margin-top:12px">
        ${labelChips(next) || "<span></span>"}
        <a href="${esc(next.app_url || "#")}" target="_blank" rel="noopener">
          <button class="primary">Open in Shortcut ↗</button>
        </a>
      </div>
    </div>`;

  if (queue.length) {
    html += `<div><p class="section-title">Then (${queue.length}) — ${whose} queue</p><ul class="queue">`;
    queue.forEach((s, i) => {
      const urg = hasUrgentLabel(s, CONFIG.URGENT_LABEL);
      html += `
        <li class="${urg ? "urgent" : ""}">
          <span class="rank">${i + 2}</span>
          <span class="qname" title="${esc(s.name)}">${esc(s.name)}</span>
          ${urg ? '<span class="label urgent">urgent</span>' : ""}
          ${timingBadges(s, nowMs)}
          <a href="${esc(s.app_url || "#")}" target="_blank" rel="noopener">
            <button class="tiny ghost">Open ↗</button>
          </a>
        </li>`;
    });
    html += `</ul></div>`;
  }

  app.innerHTML = html;
  wireControls();
}

/* ---- Team Manager (FT-2) ---- */

/** Sanitize an id into a DOM-safe fragment for element ids. */
function domId(...parts) {
  return "mq_" + parts.map((p) => String(p).replace(/[^\w-]/g, "_")).join("_");
}

/** One member's Now / Next / expandable-rest block. */
function memberRowHtml(member, pick, nowMs, uid) {
  const now = pick.next;
  const nextItem = pick.queue[0] || null;
  const rest = pick.queue.slice(1);
  const nowUrgent = now && hasUrgentLabel(now, CONFIG.URGENT_LABEL);

  // Per-member role override select (concrete roles only; blank = use global).
  const assigned = state.memberRoles[member.id] || "";
  const roleOpts = ['<option value=""' + (assigned ? "" : " selected") + '>&mdash;</option>']
    .concat(state.detectedRoles.roles.map((r) =>
      `<option value="${esc(r)}"${r === assigned ? " selected" : ""}>${esc(r)}</option>`))
    .join("");

  let html = `
    <div class="member-row">
      <div class="who">${esc(member.name)}${member.mention_name ? `<span class="mention">@${esc(member.mention_name)}</span>` : ""}<select class="member-role" data-member="${esc(member.id)}" style="margin-left:10px">${roleOpts}</select></div>
      <div class="nn${nowUrgent ? " urgent" : ""}">
        <span class="tag">Now</span>
        <span class="item">
          <div class="row" style="gap:8px">
            <a class="iname" href="${esc(now.app_url || "#")}" target="_blank" rel="noopener" title="${esc(now.name)}">${esc(now.name)}</a>
            ${nowUrgent ? '<span class="label urgent">urgent</span>' : ""}
          </div>
          ${timingBadges(now, nowMs)}
        </span>
      </div>`;

  if (nextItem) {
    const nu = hasUrgentLabel(nextItem, CONFIG.URGENT_LABEL);
    html += `
      <div class="nn next-line">
        <span class="tag">Next</span>
        <span class="item">
          <a class="iname" href="${esc(nextItem.app_url || "#")}" target="_blank" rel="noopener" title="${esc(nextItem.name)}">${esc(nextItem.name)}</a>
          ${nu ? ' <span class="label urgent">urgent</span>' : ""}
        </span>
      </div>`;
  }

  if (rest.length) {
    html += `<button class="more-toggle" data-target="${uid}">${rest.length} more assigned ▸</button>`;
    html += `<ul class="queue mini-queue" id="${uid}" style="display:none">`;
    rest.forEach((s, i) => {
      const urg = hasUrgentLabel(s, CONFIG.URGENT_LABEL);
      html += `
        <li class="${urg ? "urgent" : ""}">
          <span class="rank">${i + 3}</span>
          <span class="qname" title="${esc(s.name)}">${esc(s.name)}</span>
          ${urg ? '<span class="label urgent">urgent</span>' : ""}
          ${timingBadges(s, nowMs)}
          <a href="${esc(s.app_url || "#")}" target="_blank" rel="noopener">
            <button class="tiny ghost">Open ↗</button>
          </a>
        </li>`;
    });
    html += `</ul>`;
  }

  html += `</div>`;
  return html;
}

/** One team section: working members shown, idle ones collapsed to a count. */
function teamSectionHtml(name, key, memberIds, byId, pickFor, nowMs) {
  const working = [];
  let idle = 0;
  memberIds.forEach((id) => {
    const member = byId.get(id);
    if (!member) return;
    const pick = pickFor(id);
    if (pick.all.length) working.push({ member, pick });
    else idle++;
  });
  if (!working.length && !idle) return "";

  let html = `<div class="team-section"><h3>${esc(name)} <span class="count">${working.length} active${idle ? `, ${idle} idle` : ""}</span></h3>`;
  working
    .sort((a, b) => a.member.name.localeCompare(b.member.name))
    .forEach(({ member, pick }) => {
      html += memberRowHtml(member, pick, nowMs, domId(key, member.id));
    });
  if (!working.length) html += `<div class="idle-line">No one on this team has a ticket in this column.</div>`;
  html += `</div>`;
  return html;
}

function renderTeamManager(groups, members, stories, target, nowMs) {
  const byId = new Map(members.map((m) => [m.id, m]));

  // pickNext is memoized per member so a multi-team member isn't recomputed.
  // Each member's role = their assignment in state.memberRoles, else the global
  // role. Resolve that role's target set + cross-column rank per member.
  const picks = new Map();
  const pickFor = (id) => {
    if (!picks.has(id)) {
      const role = state.memberRoles[id] || state.role;
      const targets = resolveTargets(state.detectedRoles, role);
      const ids = targets.map((t) => t.id);
      const rank = stateRankFromTargets(targets);
      picks.set(id, pickNext(stories, id, ids, CONFIG.URGENT_LABEL, rank));
    }
    return picks.get(id);
  };

  let html = controlsHtml();
  const sections = [];

  groups
    .slice()
    .sort((a, b) => a.name.localeCompare(b.name))
    .forEach((g) => {
      const ids = g.member_ids.filter((id) => byId.has(id));
      sections.push(teamSectionHtml(g.name, g.id, ids, byId, pickFor, nowMs));
    });

  // "No team" bucket: active members belonging to no active group.
  const grouped = new Set();
  groups.forEach((g) => g.member_ids.forEach((id) => grouped.add(id)));
  const noTeamIds = members.filter((m) => !grouped.has(m.id)).map((m) => m.id);
  sections.push(teamSectionHtml("No team", "noteam", noTeamIds, byId, pickFor, nowMs));

  const body = sections.filter(Boolean).join("");
  if (body) {
    html += body;
  } else {
    html += `
      <div class="empty">
        <div class="big">🌤️</div>
        <div>No tickets in <b>${esc(roleColumnLabel(state.role))}</b> across the workspace.</div>
      </div>`;
  }

  app.innerHTML = html;
  wireControls();
  wireTeamToggles();
  wireMemberRoles();
}

function wireMemberRoles() {
  document.querySelectorAll("select.member-role[data-member]").forEach((sel) => {
    sel.onchange = () => {
      const id = sel.getAttribute("data-member");
      const v = sel.value;
      // Blank / "—" default means "use the global role": drop the override.
      if (!v) delete state.memberRoles[id];
      else state.memberRoles[id] = v;
      setStoredMemberRoles(state.memberRoles);
      refresh(true);
    };
  });
}

function wireTeamToggles() {
  document.querySelectorAll(".more-toggle[data-target]").forEach((btn) => {
    btn.onclick = () => {
      const ul = document.getElementById(btn.getAttribute("data-target"));
      if (!ul) return;
      const open = ul.style.display !== "none";
      ul.style.display = open ? "none" : "flex";
      const n = ul.children.length;
      btn.textContent = `${n} more assigned ${open ? "▸" : "▾"}`;
    };
  });
}

/* ============================================================================
 * ORCHESTRATION
 * ========================================================================== */

async function refresh(manual) {
  const token = getToken();
  if (!token) return renderSetup();

  state.loading = true;
  renderMeta();
  try {
    // First successful load: identity + workspace lookups (fetched once per boot).
    if (!state.tokenMember) {
      state.tokenMember = await getMember(token);
      state.members = await getMembers(token);
      state.groups = await getGroups(token);
      state.mode = getStoredMode();
      state.memberRoles = getStoredMemberRoles();

      // Restore the viewed member; fall back to the token owner if it's gone.
      const storedId = getStoredViewMemberId();
      const stored = storedId ? state.members.find((m) => String(m.id) === storedId) : null;
      state.viewMember = stored || state.tokenMember;
    }

    const workflows = await getWorkflows(token);

    // Detect roles from the board each refresh (cheap, keeps the picker fresh).
    state.detectedRoles = detectRoles(workflows);
    // Resolve the selected global role: stored → detected (+Planner) → first
    // detected → COLUMN_PREFIX seed if literally nothing was detected.
    const valid = new Set([...state.detectedRoles.roles, "Planner"]);
    let role = state.role || getStoredRole();
    if (!valid.has(role)) role = state.detectedRoles.roles[0] || CONFIG.COLUMN_PREFIX;
    state.role = role;
    setStoredRole(role);

    // Resolve the active target SET for the global role + its cross-column rank.
    const targets = resolveTargets(state.detectedRoles, state.role);
    const targetIds = targets.map((t) => t.id);
    state.stateRank = stateRankFromTargets(targets);
    state.target = targets[0] || null; // representative for meta display

    if (!targets.length) {
      clearError();
      app.innerHTML = controlsHtml() + `
        <div class="empty">
          <div class="big">🧭</div>
          <div>No open column resolves for role "<b>${esc(state.role)}</b>".</div>
          <div class="muted" style="margin-top:6px">Pick a different role above, or check that your board has <code>${esc(state.role)} (Stage)</code> states.</div>
        </div>`;
      wireControls();
      state.lastRefreshed = Date.now();
      return;
    }

    const now = Date.now();
    clearError();

    // Run one search per distinct target state name, concat + dedupe by story id.
    const searchAcrossTargets = async (states, ownerPrefix) => {
      const all = [];
      for (const st of states) {
        const q = `${ownerPrefix}state:"${st.name}" !is:archived`;
        all.push(...await searchStories(token, q));
      }
      return [...new Map(all.map((s) => [s.id, s])).values()];
    };

    if (state.mode === "team") {
      // Union of target states across every assigned member role + the global
      // role (bounded by #roles, not #members). No per-member network calls.
      const unionRoles = new Set([state.role, ...Object.values(state.memberRoles)]);
      const unionById = new Map();
      unionRoles.forEach((r) => resolveTargets(state.detectedRoles, r)
        .forEach((st) => { if (!unionById.has(st.id)) unionById.set(st.id, st); }));
      const stories = await searchAcrossTargets([...unionById.values()], "");
      renderTeamManager(state.groups, state.members, stories, state.target, now);
    } else {
      // Personal mode: broad query by the *viewed* member across the target set.
      const view = state.viewMember || state.tokenMember;
      const stories = await searchAcrossTargets(targets, `owner:${view.mention_name} `);
      const { next, queue } = pickNext(stories, view.id, targetIds, CONFIG.URGENT_LABEL, state.stateRank);
      renderResult(next, queue, state.target, now);
    }

    state.lastRefreshed = now;
  } catch (e) {
    if (e.code === "AUTH") {
      renderSetup("Your token was rejected. Please paste a valid Shortcut API token.");
      return;
    }
    showError(e.message || String(e));
    if (manual || !state.lastRefreshed) {
      app.innerHTML = `<div class="empty"><div class="big">⚠️</div><div>Couldn't reach Shortcut.</div>
        <div class="muted" style="margin-top:6px">${esc(e.message || "")}</div></div>`;
    }
  } finally {
    state.loading = false;
    renderMeta();
  }
}

function startPolling() {
  stopPolling();
  pollTimer = setInterval(() => refresh(false), CONFIG.POLL_MS);
}
function stopPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = null;
}

async function boot() {
  clearError();
  if (!getToken()) { renderSetup(); return; }
  state.tokenMember = null;
  await refresh(true);
  if (getToken()) startPolling();
}

// Footer wiring
// NOTE: #footPrefix is set inside renderMeta() so it tracks the selected role.
document.getElementById("footPrefix").textContent = CONFIG.COLUMN_PREFIX; // seed until first render
document.getElementById("footUrgent").textContent = CONFIG.URGENT_LABEL;
document.getElementById("appVersion").textContent = `v${CONFIG.VERSION} · built ${formatBuildStamp(new Date(document.lastModified))}`;
document.getElementById("resetToken").addEventListener("click", (e) => {
  e.preventDefault();
  clearToken();
  boot();
});

// Refresh when tab regains focus so the queue is current when you come back.
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible" && getToken() && state.tokenMember) refresh(false);
});

boot();
</script>
</body>
