<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Next Ticket — Shortcut Nudger</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --border: #2a2f3a;
    --text: #e7e9ee;
    --muted: #9aa2b1;
    --accent: #6c8cff;
    --accent-2: #4f6fe0;
    --urgent: #ff5c7a;
    --urgent-bg: #2a1620;
    --ok: #46d18b;
    --radius: 14px;
    --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 28px 20px 96px; /* extra bottom room for the fixed API tray handle */
  }

  header.app {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px 16px;
    margin-bottom: 20px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 11px;
  }
  .brand .logo {
    flex: 0 0 auto;
    width: 30px;
    height: 30px;
    display: block;
  }
  .brand .logo .mark { fill: var(--accent); }
  .brand .wordmark {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }
  .brand .name {
    font-size: 19px;
    font-weight: 700;
    letter-spacing: 0.2px;
    color: var(--text);
  }
  .brand .name .dot { color: var(--accent); }
  .brand .subtitle {
    font-size: 11.5px;
    letter-spacing: 0.9px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    margin-top: 2px;
  }

  .meta {
    color: var(--muted);
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .meta b { color: var(--text); font-weight: 600; }

  button {
    font: inherit;
    color: var(--text);
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    cursor: pointer;
    transition: border-color .15s, background .15s, transform .05s;
  }
  button:hover { border-color: var(--accent); }
  button:active { transform: translateY(1px); }
  button.primary {
    background: var(--accent-2);
    border-color: var(--accent-2);
    color: #fff;
    font-weight: 600;
  }
  button.primary:hover { background: var(--accent); border-color: var(--accent); }
  button.ghost { background: transparent; }
  button.tiny { padding: 5px 10px; font-size: 13px; border-radius: 8px; }

  a { color: var(--accent); }

  /* ---- Setup card ---- */
  .setup {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: var(--shadow);
    max-width: 520px;
    margin: 40px auto;
  }
  .setup h2 { margin: 0 0 8px; font-size: 18px; }
  .setup p { color: var(--muted); margin: 0 0 18px; }
  .setup label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .field { display: flex; gap: 8px; }
  input[type="password"], input[type="text"], select {
    flex: 1;
    font: inherit;
    color: var(--text);
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    min-width: 0;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  .hint { font-size: 12.5px; color: var(--muted); margin-top: 12px; }

  /* ---- Next card ---- */
  .next-card {
    position: relative;
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 22px 20px;
    box-shadow: var(--shadow);
    margin-bottom: 26px;
  }
  .next-card.is-urgent {
    border-color: var(--urgent);
    box-shadow: 0 10px 30px rgba(255, 92, 122, 0.18);
  }
  .kicker {
    font-size: 12px;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 10px;
  }
  .next-card.is-urgent .kicker { color: var(--urgent); }
  .story-name { font-size: 22px; font-weight: 700; margin: 0 0 6px; line-height: 1.3; }
  .story-id { color: var(--muted); font-size: 13px; margin-bottom: 14px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

  .labels { display: flex; gap: 6px; flex-wrap: wrap; }
  .label {
    font-size: 12px;
    padding: 3px 9px;
    border-radius: 999px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .label.urgent {
    background: var(--urgent-bg);
    border-color: var(--urgent);
    color: var(--urgent);
    font-weight: 600;
  }

  /* ---- Timing badges (FT-3/FT-4) ---- */
  .badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge {
    font-size: 11.5px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .badge.stale {
    background: var(--urgent-bg);
    border-color: var(--urgent);
    color: var(--urgent);
    font-weight: 600;
  }

  /* ---- Queue list ---- */
  .section-title {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin: 0 0 12px;
  }
  ul.queue { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
  ul.queue li {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
  }
  ul.queue li .rank { color: var(--muted); font-variant-numeric: tabular-nums; width: 22px; text-align: right; }
  ul.queue li .qname { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  ul.queue li.urgent { border-color: var(--urgent); }
  ul.queue li a { text-decoration: none; }

  .empty {
    background: var(--panel);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 40px 22px;
    text-align: center;
    color: var(--muted);
  }
  .empty .big { font-size: 40px; margin-bottom: 8px; }

  /* ---- Controls row: mode toggle + member switcher (FT-1/FT-2) ---- */
  .controls {
    display: flex;
    align-items: center;
    gap: 12px 16px;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }
  /* .tabs reuses the .mode-toggle look (now a 4-button strip). */
  .mode-toggle, .tabs { display: inline-flex; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .mode-toggle button, .tabs button {
    border: none;
    border-radius: 0;
    background: var(--panel);
    color: var(--muted);
    padding: 8px 14px;
  }
  .mode-toggle button + button, .tabs button + button { border-left: 1px solid var(--border); }
  .mode-toggle button.active, .tabs button.active { background: var(--accent-2); color: #fff; font-weight: 600; }
  .mode-toggle button:hover:not(.active), .tabs button:hover:not(.active) { color: var(--text); }

  .switcher { display: inline-flex; align-items: center; gap: 8px; }
  .switcher select { flex: 0 1 220px; padding: 8px 10px; }
  .viewing-hint { color: var(--muted); font-size: 12.5px; }
  .viewing-hint b { color: var(--text); }
  .viewing-hint .reset { margin-left: 8px; }

  /* ---- Team Manager (FT-2) ---- */
  .team-section { margin-bottom: 26px; }
  .team-section > h3 {
    font-size: 14px;
    margin: 0 0 12px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .team-section > h3 .count { color: var(--muted); font-size: 12px; font-weight: 400; }
  .member-row {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .member-row .who { font-weight: 600; margin-bottom: 8px; }
  .member-row .who .mention { color: var(--muted); font-weight: 400; font-size: 12.5px; margin-left: 6px; }
  .nn { display: flex; gap: 10px; align-items: baseline; margin-bottom: 6px; flex-wrap: wrap; }
  .nn .tag {
    font-size: 10.5px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--accent);
    flex: 0 0 auto;
    width: 42px;
  }
  .nn.next-line .tag { color: var(--muted); }
  .nn .item { flex: 1; min-width: 0; }
  .nn .item .iname { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .nn .item a { text-decoration: none; }
  .nn.urgent .tag { color: var(--urgent); }
  .more-toggle {
    background: transparent;
    border: none;
    color: var(--accent);
    padding: 2px 0;
    font-size: 12.5px;
    cursor: pointer;
  }
  .more-toggle:hover { text-decoration: underline; }
  .mini-queue { margin-top: 8px; }
  .idle-line { color: var(--muted); font-size: 12.5px; padding: 4px 2px; }

  /* ---- Workflow-state chip on queue rows (rule #7) ---- */
  .state-chip {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--muted);
    white-space: nowrap;
  }

  /* ---- Paused tickets (generalized paused rule) ---- */
  .paused-chip {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    background: #241a2e;
    border: 1px solid #6b4fd0;
    color: #c3b3f5;
    font-weight: 600;
    white-space: nowrap;
  }
  ul.queue li.paused-row { border-style: dashed; opacity: 0.92; }
  ul.queue li.paused-row .rank { color: #c3b3f5; }
  .nn.paused-line .tag { color: #c3b3f5; }
  .member-row.admin-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .member-row.admin-row .who { margin-bottom: 0; }

  /* ---- Manage Teammates modal (rule #6) ---- */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding: 60px 16px;
    z-index: 60;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    width: 100%;
    max-width: 520px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    padding: 20px;
  }
  .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .modal-head h3 { margin: 0; font-size: 16px; }
  .modal input[type="text"] { margin-bottom: 14px; }
  .modal-list { overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
  .manage-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
  }
  .manage-row .who { font-weight: 600; }
  .manage-row .mention { color: var(--muted); font-weight: 400; font-size: 12.5px; margin-left: 6px; }

  /* ---- API log tray (rule #9) ---- */
  .api-tray {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 40;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    pointer-events: none;
  }
  .api-tray-handle {
    pointer-events: auto;
    align-self: center;
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 10px 10px 0 0;
    background: var(--panel);
    color: var(--muted);
    padding: 6px 16px;
    font-size: 12px;
    cursor: pointer;
    font-variant-numeric: tabular-nums;
  }
  .api-tray-handle:hover { color: var(--text); border-color: var(--accent); }
  .api-tray-handle .chev { margin-left: 4px; }
  .api-tray-handle.api-stop {
    color: #ff6b6b;
    border-color: rgba(255, 107, 107, 0.5);
    background: rgba(255, 107, 107, 0.08);
    margin-top: 4px;
  }
  .api-tray-handle.api-stop:hover { color: #fff; background: rgba(255, 107, 107, 0.22); border-color: #ff6b6b; }
  .api-tray-handle.api-stop[hidden] { display: none; }
  .api-tray-body {
    pointer-events: auto;
    display: none;
    background: var(--panel);
    border-top: 1px solid var(--border);
    max-height: 40vh;
    overflow-y: auto;
    padding: 6px 16px 10px;
  }
  .api-tray.open .api-tray-body { display: block; }
  .api-row {
    display: flex;
    gap: 12px;
    align-items: center;
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .api-row:last-child { border-bottom: none; }
  .api-row .api-method { color: var(--muted); width: 36px; flex: 0 0 auto; }
  .api-row .api-path { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .api-row .api-status { width: 44px; text-align: right; flex: 0 0 auto; }
  .api-row .api-ms { width: 64px; text-align: right; color: var(--muted); flex: 0 0 auto; }
  .api-row.ok .api-status { color: var(--ok); }
  .api-row.err .api-status { color: var(--urgent); }
  .api-row.pending .api-status { color: var(--accent); }

  .banner {
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 18px;
    font-size: 14px;
    display: none;
  }
  .banner.error { display: block; background: #2a1620; border: 1px solid var(--urgent); color: #ffb3c2; }

  .muted { color: var(--muted); }
  .spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  footer { margin-top: 40px; text-align: center; color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <div class="brand">
      <svg class="logo" viewBox="0 0 32 32" role="img" aria-label="Shortcut Nudger logo" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path class="mark" d="M17.6 2.3a1.4 1.4 0 0 0-2.4 1V13H4.9a1.4 1.4 0 0 0-1 2.4l11.5 11.9a1.4 1.4 0 0 0 2.4-1V17h10.3a1.4 1.4 0 0 0 1-2.4L17.6 2.3Z"/>
      </svg>
      <span class="wordmark">
        <span class="name">Shortcut Nudger <span class="dot">●</span></span>
        <span class="subtitle">Next Ticket</span>
      </span>
    </div>
    <div class="meta" id="metaBar"></div>
  </header>

  <div id="banner" class="banner"></div>
  <main id="app"></main>

  <footer>
    Shortcut Nudger · role <b id="footPrefix"></b> · next = furthest-along ticket across its columns · urgent label = <b id="footUrgent"></b>
    · <a href="#" id="resetToken">reset token</a>
    · <span id="appVersion"></span>
  </footer>
</div>

<!-- Manage Teammates modal (rule #6) — plain hidden div toggled by .open -->
<div id="manageModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-head">
      <h3>Manage Teammates</h3>
      <button class="tiny ghost" id="closeManage">Close ✕</button>
    </div>
    <input type="text" id="manageFilter" placeholder="Filter by name…" autocomplete="off" spellcheck="false" />
    <div class="modal-list" id="manageList"></div>
  </div>
</div>

<!-- API log tray (rule #9) — session-only, token redacted -->
<div id="apiTray" class="api-tray">
  <button class="api-tray-handle" id="apiTrayHandle">Shortcut API</button>
  <button class="api-tray-handle api-stop" id="apiStopBtn" hidden>⏹ Stop execution</button>
  <div class="api-tray-body" id="apiTrayBody"></div>
</div>

<script>
/* ============================================================================
 * CONFIG — tweak these to change behaviour. No build step, no dependencies.
 * ========================================================================== */
const CONFIG = {
  VERSION: "1.1.0",           // app version shown in footer; bump by hand per release
  WORKFLOW_ID: 500003585,     // ONLY this workflow's states/roles are used
  WORKFLOW_NAME: "Development", // shown in the header badge
  EXCLUDED_ROLES: ["Inbox", "Backlog", "Completed"], // role names dropped from detection (case-insensitive)
  COLUMN_PREFIX: "Dev",       // FALLBACK SEED ONLY — used to seed the role when nothing is detected/stored.
                              //   Live targets now come from detected roles (Story 3/4), not this key.
  URGENT_LABEL: "urgent",     // stories carrying this label jump the queue
  POLL_MS: 30000,             // auto-refresh interval (ms)
  STALE_DAYS: 3,              // a ticket sat this many days in its column gets the "stale" highlight
  API_BASE: "https://api.app.shortcut.com/api/v3",
  TOKEN_KEY: "shortcut_nudger_token",
  VIEW_MEMBER_KEY: "shortcut_nudger_view_member", // persists the teammate whose queue you view (My Teammates tab)
  TAB_KEY: "shortcut_nudger_tab",                 // persists the active tab (replaces the old MODE_KEY)
  ROLE_KEY: "shortcut_nudger_role",               // persists the My Queue role (also the global fallback role)
  ROLEVIEW_KEY: "shortcut_nudger_roleview",       // persists the Role Manager's viewed role
  TEAM_KEY: "shortcut_nudger_team",               // persists the Team Manager's selected team
  MEMBER_ROLES_KEY: "shortcut_nudger_member_roles", // persists per-member role assignments (Story 4)
};

/* ============================================================================
 * PURE LOGIC — no DOM, no network. Reusable verbatim by a future Tampermonkey
 * overlay. Fully unit-testable.
 * ========================================================================== */

/**
 * Board convention: workflow state names are `Role (Stage)`, e.g. "Dev (Ready)",
 * "QA (Active)". The role is group 1 (trimmed). States that don't match this
 * pattern (Inbox / Backlog / Completed) are ignored by role detection.
 */
const ROLE_STATE_RE = /^(.+?)\s*\(([^)]+)\)\s*$/;

/**
 * Scan every workflow state for the `Role (Stage)` pattern and bucket the
 * non-done states by role name (group 1, trimmed). Matching is by exact role
 * equality, so role "Dev" does NOT swallow "DevOps (Ready)". Each state is
 * augmented with its workflow id/name. Roles with no non-done columns are
 * excluded. A role's target is therefore ALL of its non-done columns.
 * @returns {{ roles: string[], byRole: Map<string, object[]> }} roles sorted A→Z,
 *   each mapped to the full array of its target state objects.
 */
function detectRoles(workflows, excludedRoles = []) {
  const byRole = new Map();
  const excluded = new Set((excludedRoles || []).map((r) => String(r).toLowerCase()));
  for (const wf of workflows || []) {
    for (const st of wf.states || []) {
      const m = ROLE_STATE_RE.exec(st.name || "");
      if (!m || st.type === "done") continue; // ignore non-role + completed columns
      const role = m[1].trim();
      if (excluded.has(role.toLowerCase())) continue; // drop excluded roles (case-insensitive)
      const arr = byRole.get(role) || [];
      arr.push({ ...st, workflow_id: wf.id, workflow_name: wf.name });
      byRole.set(role, arr);
    }
  }
  const roles = [...byRole.keys()].sort((a, b) => a.localeCompare(b));
  return { roles, byRole };
}

/**
 * Resolve the array of target state objects for a selected role.
 *  - A normal role → byRole.get(role) (all its non-done columns; empty if unknown).
 *  - "Planner" → every role's columns, flattened and deduped by state id.
 * @returns {object[]}
 */
function resolveTargets(detected, roleName) {
  const byRole = (detected && detected.byRole) || new Map();
  if (roleName === "Planner") {
    const seen = new Map();
    for (const arr of byRole.values()) {
      for (const st of arr || []) {
        if (st && !seen.has(st.id)) seen.set(st.id, st);
      }
    }
    return [...seen.values()];
  }
  return byRole.get(roleName) || [];
}

/**
 * Build a stateRank map `{ [stateId]: rank }` from an array of target state
 * objects, ranking by DESCENDING board `position` so rank 0 = most-advanced
 * column. Used for cross-column sorting when a pick spans multiple columns
 * (a role's own stages, Planner, or a mixed-role team). Pure.
 * @returns {Object<string|number, number>}
 */
function stateRankFromTargets(targets) {
  const rank = {};
  (targets || [])
    .slice()
    .sort((a, b) => (b.position ?? 0) - (a.position ?? 0)) // most-advanced first
    .forEach((st, i) => { if (st) rank[st.id] = i; });
  return rank;
}

/** True if a story carries the urgent label (case-insensitive name match). */
function hasUrgentLabel(story, urgentLabel) {
  const target = urgentLabel.toLowerCase();
  const labels = story.labels || [];
  return labels.some((l) => (l.name || "").toLowerCase() === target);
}

/**
 * Rank the stories owned by me across one OR MORE target columns.
 * Rule: urgent first, then (when a stateRank map is supplied) by column rank,
 * then top-to-bottom by per-column board position.
 * @param {object[]} stories
 * @param {number} myId
 * @param {(number|number[]|Set<number>)} targetStateIds - single id, array, or Set.
 * @param {string} urgentLabel
 * @param {Object<string|number, number>} [stateRank] - `{ [stateId]: rank }`. When
 *   absent/single-column, sorting falls back to (urgent, position) — unchanged
 *   single-column behavior.
 * @returns {{ next: object|null, queue: object[], all: object[] }}
 */
function pickNext(stories, myId, targetStateIds, urgentLabel, stateRank) {
  // Normalize the target id(s) to a Set (accept single id, array, or Set).
  const idSet =
    targetStateIds instanceof Set
      ? targetStateIds
      : new Set(Array.isArray(targetStateIds) ? targetStateIds : [targetStateIds]);
  const hasRank = stateRank && Object.keys(stateRank).length > 0;

  const mine = (stories || []).filter(
    (s) =>
      Array.isArray(s.owner_ids) &&
      s.owner_ids.includes(myId) &&
      idSet.has(s.workflow_state_id) &&
      !s.archived &&
      !s.completed
  );

  const sorted = mine.slice().sort((a, b) => {
    const ua = hasUrgentLabel(a, urgentLabel) ? 1 : 0;
    const ub = hasUrgentLabel(b, urgentLabel) ? 1 : 0;
    if (ua !== ub) return ub - ua;                 // urgent first
    if (hasRank) {                                  // cross-column: order by column rank
      const ra = stateRank[a.workflow_state_id] ?? 0;
      const rb = stateRank[b.workflow_state_id] ?? 0;
      if (ra !== rb) return ra - rb;
    }
    return (a.position ?? 0) - (b.position ?? 0);   // then top-to-bottom within a column
  });

  return { next: sorted[0] || null, queue: sorted.slice(1), all: sorted };
}

/** True if a state's stage (group 2 of `Role (Stage)`) matches /paused/i. */
function isPausedState(st) {
  if (!st || !st.name) return false;
  const m = ROLE_STATE_RE.exec(st.name);
  return !!m && /paused/i.test(m[2]);
}

/**
 * Paused-aware ranking for one member in one role. Composes pickNext() over the
 * non-paused and paused subsets of a role's target columns — it does NOT
 * re-implement filtering/ranking.
 *
 * Rules encoded:
 *  - `next`/`queue` are drawn ONLY from the non-paused base, so a paused ticket
 *    is never surfaced as "next" (even if urgent).
 *  - Paused tickets surface (in `paused`) ONLY when the member has no non-paused
 *    ticket strictly MORE advanced than the entry/"Ready" column — then they
 *    appear alongside the top entry ticket. Strict `>` means a member whose only
 *    work is a Ready ticket still sees their paused item.
 * @returns {{ next: object|null, queue: object[], paused: object[], all: object[] }}
 */
function pickNextPaused(stories, memberId, roleTargets, urgentLabel) {
  const targets = roleTargets || [];
  const paused    = targets.filter(isPausedState);
  const nonPaused = targets.filter((st) => !isPausedState(st));

  const npRank   = stateRankFromTargets(nonPaused);
  const fullRank = stateRankFromTargets(targets);

  const base       = pickNext(stories, memberId, nonPaused.map((s) => s.id), urgentLabel, npRank);
  const pausedPick = pickNext(stories, memberId, paused.map((s) => s.id), urgentLabel, fullRank);

  // entry column = least-advanced (min position) non-paused target
  const entryPos = nonPaused.length ? Math.min(...nonPaused.map((s) => s.position ?? 0)) : -Infinity;
  // active work = a non-paused ticket strictly MORE advanced than the entry column
  const hasActiveWork = base.all.some((s) => {
    const st = nonPaused.find((t) => t.id === s.workflow_state_id);
    return st && (st.position ?? 0) > entryPos;
  });

  const surfaced = hasActiveWork ? [] : pausedPick.all;
  return { next: base.next, queue: base.queue, paused: surfaced, all: base.all };
}

/**
 * Flat `{ [stateId]: stateName }` lookup spanning every workflow's states, so a
 * queue row can resolve its `Role (Stage)` name (even Planner's cross-column
 * items). Pure.
 * @returns {Object<string|number, string>}
 */
function buildStateNameById(workflows) {
  const map = {};
  for (const wf of workflows || [])
    for (const st of wf.states || [])
      if (st && st.id != null) map[st.id] = st.name || "";
  return map;
}

/**
 * Compact, human elapsed time from an ISO timestamp to `nowMs`.
 * Buckets: <60s "just now"; <60m "Nm"; <24h "Nh"; else "Nd".
 * `nowMs` is injected so this stays pure and unit-testable.
 * @returns {string|null} formatted string, or null for missing/unparseable input.
 */
function formatDuration(fromISO, nowMs) {
  if (!fromISO) return null;
  const then = Date.parse(fromISO);
  if (Number.isNaN(then)) return null;
  const ms = Math.max(0, nowMs - then);
  const sec = Math.floor(ms / 1000);
  if (sec < 60) return "just now";
  const min = Math.floor(sec / 60);
  if (min < 60) return `${min}m`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}h`;
  const days = Math.floor(hr / 24);
  return `${days}d`;
}

/** Whole days elapsed from an ISO timestamp to `nowMs` (0 if missing/invalid). */
function daysSince(fromISO, nowMs) {
  if (!fromISO) return 0;
  const then = Date.parse(fromISO);
  if (Number.isNaN(then)) return 0;
  return Math.floor(Math.max(0, nowMs - then) / 86400000);
}

/**
 * Format a Date as "YYYY-MM-DD HH:MM" (24-hour, no seconds), for the build stamp
 * derived from `document.lastModified`. Returns "unknown" for an invalid Date.
 * @param {Date} date
 * @returns {string}
 */
function formatBuildStamp(date) {
  if (!(date instanceof Date) || Number.isNaN(date.getTime())) return "unknown";
  const pad = (n) => String(n).padStart(2, "0");
  const Y = date.getFullYear();
  const M = pad(date.getMonth() + 1);
  const D = pad(date.getDate());
  const h = pad(date.getHours());
  const m = pad(date.getMinutes());
  return `${Y}-${M}-${D} ${h}:${m}`;
}

/* ============================================================================
 * API MODULE — thin wrappers over the Shortcut REST API.
 *
 * CORS note: we authenticate with the `?token=` query parameter, NOT the
 * `Shortcut-Token` header. A custom request header would force the browser to
 * send a CORS *preflight* (OPTIONS) request, which Shortcut answers with a bare
 * 401 and no `Access-Control-Allow-Origin` — killing the call. Passing the token
 * as a query param keeps every request a "simple" CORS request (no preflight),
 * which is the path Shortcut echoes the browser's Origin back on. So these run
 * straight from the browser with no backend/proxy.
 * ========================================================================== */

const API_ORIGIN = new URL(CONFIG.API_BASE).origin;

function withToken(rawUrl, token) {
  const u = new URL(rawUrl);
  u.searchParams.set("token", token);
  return u.toString();
}

/** Display path for the API tray: method-friendly path + query, token stripped. */
function apiDisplayPath(url) {
  try {
    const u = new URL(url);
    u.searchParams.delete("token");
    return u.pathname + (u.search || "");
  } catch { return String(url); }
}

let apiLogSeq = 0;
let apiAbort = new AbortController(); // aborts all in-flight fetches when the Stop button fires

async function apiFetch(pathOrUrl, token) {
  const base = pathOrUrl.startsWith("http")
    ? pathOrUrl
    : pathOrUrl.startsWith("/api/")
      ? API_ORIGIN + pathOrUrl
      : CONFIG.API_BASE + pathOrUrl;

  // API log entry (session-only, token redacted). `state` exists by call time.
  const entry = {
    id: ++apiLogSeq,
    method: "GET",
    path: apiDisplayPath(base),
    status: null,
    startedAt: Date.now(),
    ms: null,
  };
  if (typeof state !== "undefined" && state.apiLog) {
    state.apiLog.unshift(entry);
    if (state.apiLog.length > 200) state.apiLog.length = 200;
    apiTrayRender();
  }

  try {
    // No custom headers → simple request → no preflight.
    const res = await fetch(withToken(base, token), { signal: apiAbort.signal });
    entry.status = res.status;
    entry.ms = Date.now() - entry.startedAt;
    apiTrayRender();

    if (res.status === 401 || res.status === 403) {
      const err = new Error("Token rejected (401/403). Check that your API token is valid.");
      err.code = "AUTH";
      throw err;
    }
    if (!res.ok) {
      const body = await res.text().catch(() => "");
      throw new Error(`Shortcut API ${res.status}: ${body.slice(0, 200) || res.statusText}`);
    }
    return res.json();
  } catch (e) {
    if (entry.status === null) entry.status = "ERR";
    if (entry.ms === null) entry.ms = Date.now() - entry.startedAt;
    entry.error = e.message || String(e);
    apiTrayRender();
    throw e;
  }
}

/** Current member tied to the token → identity, no name entry needed. */
async function getMember(token) {
  const m = await apiFetch("/member", token);
  return {
    id: m.id,
    name: m.name || m.profile?.name || m.mention_name || "you",
    mention_name: m.mention_name || m.profile?.mention_name || "",
  };
}

/** All active (non-disabled) members, `{ id, name, mention_name }`, sorted by name. */
async function getMembers(token) {
  const raw = await apiFetch("/members", token);
  return (raw || [])
    .filter((m) => !m.disabled)
    .map((m) => ({
      id: m.id,
      name: m.profile?.name || m.profile?.mention_name || "unknown",
      mention_name: m.profile?.mention_name || "",
    }))
    .sort((a, b) => a.name.localeCompare(b.name));
}

/** All active (non-archived) teams/groups, `{ id, name, member_ids }`. */
async function getGroups(token) {
  const raw = await apiFetch("/groups", token);
  return (raw || [])
    .filter((g) => !g.archived)
    .map((g) => ({
      id: g.id,
      name: g.name || "Team",
      member_ids: Array.isArray(g.member_ids) ? g.member_ids : [],
      default_workflow_id: g.default_workflow_id ?? null,
    }));
}

async function getWorkflows(token) {
  return apiFetch("/workflows", token);
}

/**
 * Search stories via the operator-based search endpoint, following the `next`
 * cursor to gather every page. We query broadly (by owner + state) and then
 * filter precisely client-side in pickNext(), so an imperfect query can't
 * corrupt the ranking.
 */
async function searchStories(token, query) {
  const out = [];
  let path = `/search/stories?page_size=25&query=${encodeURIComponent(query)}`;
  let guard = 0;
  while (path && guard++ < 40) {
    const page = await apiFetch(path, token);
    if (Array.isArray(page.data)) out.push(...page.data);
    path = page.next || null; // `next` is a relative /api/v3/... path or null
  }
  return out;
}

function esc(s) {

    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
  );
}

}

/**
 * Timing chips for a story: how long it's sat in its current column
 * (moved_at, falling back to created_at) and how long since anything changed
 * (updated_at). In-state chip gets the `stale` class past CONFIG.STALE_DAYS.
 * @returns {string} HTML (possibly empty).
 */
function timingBadges(story, nowMs) {
  const inState = formatDuration(story.moved_at || story.created_at, nowMs);
  const touched = formatDuration(story.updated_at, nowMs);
  const chips = [];
  if (inState) {
    const stale = daysSince(story.moved_at || story.created_at, nowMs) >= CONFIG.STALE_DAYS;
    chips.push(`<span class="badge${stale ? " stale" : ""}" title="Time in current column">⏱ in state ${esc(inState)}</span>`);
  }
  if (touched) {
    const suffix = touched === "just now" ? "" : " ago";
    chips.push(`<span class="badge" title="Time since last change">✎ updated ${esc(touched)}${suffix}</span>`);
  }
  if (!chips.length) return "";
  return `<div class="badges">${chips.join("")}</div>`;
}

function wireControls() {
  document.querySelectorAll(".tabs button[data-tab]").forEach((btn) => {
    btn.onclick = () => {
      const t = btn.getAttribute("data-tab");
      if (t === state.tab) return;
      state.tab = t;
      setStoredTab(t);
      refresh(true);
    };
  });

  const myRole = document.getElementById("myRoleSelect");
  if (myRole) myRole.onchange = () => { state.myRole = myRole.value; setStoredRole(state.myRole); refresh(true); };

  const roleView = document.getElementById("roleViewSelect");
  if (roleView) roleView.onchange = () => { state.roleView = roleView.value; setStoredRoleView(state.roleView); refresh(true); };

  const teammate = document.getElementById("teammateSelect");
  if (teammate) teammate.onchange = () => { state.teammateId = teammate.value; setStoredViewMemberId(teammate.value); refresh(true); };

  const team = document.getElementById("teamSelect");
  if (team) team.onchange = () => { state.teamId = team.value; setStoredTeamId(team.value); refresh(true); };

  const manage = document.getElementById("manageTeammatesBtn");
  if (manage) manage.onclick = () => openManageModal();

  const reset = document.getElementById("resetMe");
  if (reset) {
    reset.onclick = (e) => {
      e.preventDefault();
      state.teammateId = String(state.tokenMember.id);
      setStoredViewMemberId(state.tokenMember.id);
      refresh(true);
    };
  }
}

function renderResult(next, queue, paused, roleName, viewMember, nowMs) {
  viewMember = viewMember || state.tokenMember;
  paused = paused || [];
  const urgent = next && hasUrgentLabel(next, CONFIG.URGENT_LABEL);
  const viewingOther = viewMember && state.tokenMember && viewMember.id !== state.tokenMember.id;
  const whose = viewingOther ? `${esc(viewMember.name)}'s` : "your";

  let html = controlsHtml();

  // Fully empty: no next, no queue, no surfaced paused.
  if (!next && !queue.length && !paused.length) {
    const colText = roleColumnLabel(roleName);
    html += `
      <div class="empty">
        <div class="big">🎉</div>
        <div>Nothing assigned to ${viewingOther ? `<b>${esc(viewMember.name)}</b>` : "you"} in <b>${esc(colText)}</b>.</div>
        <div class="muted" style="margin-top:6px">${viewingOther ? "Their column is clear." : "Enjoy the breather — or grab something from the board."}</div>
      </div>`;
    app.innerHTML = html;
    wireControls();
    return;
  }

  if (next) {
    html += `
      <div class="next-card${urgent ? " is-urgent" : ""}">
        <div class="kicker">${urgent ? "🔥 Urgent — work on this next" : "Work on this next"}</div>
        <h2 class="story-name">${esc(next.name)}</h2>
        <div class="story-id">${esc(storyIdLabel(next))}</div>
        ${timingBadges(next, nowMs)}
        <div class="row" style="justify-content:space-between; margin-top:12px">
          ${labelChips(next) || "<span></span>"}
          <a href="${esc(next.app_url || "#")}" target="_blank" rel="noopener">
            <button class="primary">Open in Shortcut ↗</button>
          </a>
        </div>
      </div>`;
  }

  if (queue.length) {
    html += `<div><p class="section-title">Then (${queue.length}) — ${whose} queue</p><ul class="queue">`;
    queue.forEach((s, i) => {
      const urg = hasUrgentLabel(s, CONFIG.URGENT_LABEL);
      html += `
        <li class="${urg ? "urgent" : ""}">
          <span class="rank">${i + 2}</span>
          <span class="qname" title="${esc(s.name)}">${esc(s.name)}</span>
          ${urg ? '<span class="label urgent">urgent</span>' : ""}
          ${stateChip(s)}
          ${timingBadges(s, nowMs)}
          <a href="${esc(s.app_url || "#")}" target="_blank" rel="noopener">
            <button class="tiny ghost">Open ↗</button>
          </a>
        </li>`;
    });
    html += `</ul></div>`;
  }

  // Surfaced paused tickets — visually secondary, never "next" (even if urgent).
  if (paused.length) {
    html += `<div><p class="section-title">Paused (${paused.length}) — waiting on someone else</p><ul class="queue">`;
    paused.forEach((s) => {
      html += `
        <li class="paused-row">
          <span class="rank">⏸</span>
          <span class="qname" title="${esc(s.name)}">${esc(s.name)}</span>
          <span class="paused-chip">Paused</span>
          ${stateChip(s)}
          ${timingBadges(s, nowMs)}
          <a href="${esc(s.app_url || "#")}" target="_blank" rel="noopener">
            <button class="tiny ghost">Open ↗</button>
          </a>
        </li>`;
    });
    html += `</ul></div>`;
  }

  app.innerHTML = html;
  wireControls();
}

/* ---- Team Manager (FT-2) ---- */

/** Sanitize an id into a DOM-safe fragment for element ids. */
function domId(...parts) {
  return "mq_" + parts.map((p) => String(p).replace(/[^\w-]/g, "_")).join("_");
}

/** One member's Now / Next / Paused / expandable-rest block. */
function memberRowHtml(member, pick, nowMs, uid) {
  const pausedAll = (pick.paused || []).slice();
  let now = pick.next;
  let nowIsPaused = false;
  // No non-paused work but a paused ticket surfaced → show it as the "Now" item.
  if (!now && pausedAll.length) {
    now = pausedAll.shift();
    nowIsPaused = true;
  }

  const nextItem = pick.queue[0] || null;
  const rest = pick.queue.slice(1);
  const nowUrgent = now && !nowIsPaused && hasUrgentLabel(now, CONFIG.URGENT_LABEL);

  let html = `
    <div class="member-row">
      <div class="who">${esc(member.name)}${member.mention_name ? `<span class="mention">@${esc(member.mention_name)}</span>` : ""}<span style="margin-left:10px">${memberRoleSelectHtml(member.id)}</span></div>`;

  if (now) {
    html += `
      <div class="nn${nowUrgent ? " urgent" : ""}${nowIsPaused ? " paused-line" : ""}">
        <span class="tag">${nowIsPaused ? "Paused" : "Now"}</span>
        <span class="item">
          <div class="row" style="gap:8px">
            <a class="iname" href="${esc(now.app_url || "#")}" target="_blank" rel="noopener" title="${esc(now.name)}">${esc(now.name)}</a>
            ${nowIsPaused ? '<span class="paused-chip">Paused</span>' : nowUrgent ? '<span class="label urgent">urgent</span>' : ""}
            ${stateChip(now)}
          </div>
          ${timingBadges(now, nowMs)}
        </span>
      </div>`;
  }

  if (nextItem) {
    const nu = hasUrgentLabel(nextItem, CONFIG.URGENT_LABEL);
    html += `
      <div class="nn next-line">
        <span class="tag">Next</span>
        <span class="item">
          <a class="iname" href="${esc(nextItem.app_url || "#")}" target="_blank" rel="noopener" title="${esc(nextItem.name)}">${esc(nextItem.name)}</a>
          ${nu ? ' <span class="label urgent">urgent</span>' : ""}
          ${stateChip(nextItem)}
        </span>
      </div>`;
  }

  // Any remaining surfaced paused tickets (beyond one shown as "Now").
  pausedAll.forEach((s) => {
    html += `
      <div class="nn paused-line">
        <span class="tag">Paused</span>
        <span class="item">
          <a class="iname" href="${esc(s.app_url || "#")}" target="_blank" rel="noopener" title="${esc(s.name)}">${esc(s.name)}</a>
          <span class="paused-chip">Paused</span>
          ${stateChip(s)}
        </span>
      </div>`;
  });

  if (rest.length) {
    html += `<button class="more-toggle" data-target="${uid}">${rest.length} more assigned ▸</button>`;
    html += `<ul class="queue mini-queue" id="${uid}" style="display:none">`;
    rest.forEach((s, i) => {
      const urg = hasUrgentLabel(s, CONFIG.URGENT_LABEL);
      html += `
        <li class="${urg ? "urgent" : ""}">
          <span class="rank">${i + 3}</span>
          <span class="qname" title="${esc(s.name)}">${esc(s.name)}</span>
          ${urg ? '<span class="label urgent">urgent</span>' : ""}
          ${stateChip(s)}
          ${timingBadges(s, nowMs)}
          <a href="${esc(s.app_url || "#")}" target="_blank" rel="noopener">
            <button class="tiny ghost">Open ↗</button>
          </a>
        </li>`;
    });
    html += `</ul>`;
  }

  html += `</div>`;
  return html;
}

/** One team section: working members shown, idle ones collapsed to a count. */
function teamSectionHtml(name, key, memberIds, byId, pickFor, nowMs) {
  const working = [];
  let idle = 0;
  memberIds.forEach((id) => {
    const member = byId.get(id);
    if (!member) return;
    const pick = pickFor(id);
    // Count surfaced paused too, so a member with only a paused ticket shows.
    if (pick.next || pick.queue.length || (pick.paused && pick.paused.length)) working.push({ member, pick });
    else idle++;
  });
  if (!working.length && !idle) return "";

  let html = `<div class="team-section"><h3>${esc(name)} <span class="count">${working.length} active${idle ? `, ${idle} idle` : ""}</span></h3>`;
  working
    .sort((a, b) => a.member.name.localeCompare(b.member.name))
    .forEach(({ member, pick }) => {
      html += memberRowHtml(member, pick, nowMs, domId(key, member.id));
    });
  if (!working.length) html += `<div class="idle-line">No one on this team has a ticket in this column.</div>`;
  html += `</div>`;
  return html;
}

/** Per-member paused-aware pick, memoized. Role = override, else global fallback. */
function makePickFor(stories) {
  const picks = new Map();
  return (id) => {
    if (!picks.has(id)) {
      const role = state.memberRoles[id] || state.role;
      const targets = resolveTargets(state.detectedRoles, role);
      picks.set(id, pickNextPaused(stories, id, targets, CONFIG.URGENT_LABEL));
    }
    return picks.get(id);
  };
}

/** Render a single selected team's members (Now / Next / Paused / rest). */
function renderTeamManager(team, members, stories, nowMs) {
  const byId = new Map(members.map((m) => [m.id, m]));
  const pickFor = makePickFor(stories);

  let html = controlsHtml();
  const ids = team.member_ids.filter((id) => byId.has(id));
  const section = teamSectionHtml(team.name, team.id, ids, byId, pickFor, nowMs);
  if (section) {
    html += section;
  } else {
    html += `
      <div class="empty">
        <div class="big">🌤️</div>
        <div>No active work for <b>${esc(team.name)}</b> right now.</div>
      </div>`;
  }

  app.innerHTML = html;
  wireControls();
  wireTeamToggles();
  wireMemberRoles();
}

/** Simple admin-style row: name (+ optional suffix) and a role override select. */
function adminMemberRowHtml(member, suffix) {
  return `
    <div class="member-row admin-row">
      <div class="who">${esc(member.name)}${member.mention_name ? `<span class="mention">@${esc(member.mention_name)}</span>` : ""}${suffix || ""}</div>
      ${memberRoleSelectHtml(member.id)}
    </div>`;
}

/**
 * Role Manager: everyone assigned to state.roleView (with their Now/Next/Paused),
 * a Missing Role Assignment list, and a reveal toggle for teammates in other roles.
 */
function renderRoleManager(members, stories, nowMs) {
  const roleView = state.roleView;
  const targets = resolveTargets(state.detectedRoles, roleView);
  const picks = new Map();
  const pickFor = (id) => {
    if (!picks.has(id)) picks.set(id, pickNextPaused(stories, id, targets, CONFIG.URGENT_LABEL));
    return picks.get(id);
  };

  const assigned = [], missing = [], others = [];
  members.forEach((m) => {
    const r = state.memberRoles[m.id];
    if (r === roleView) assigned.push(m);
    else if (!r) missing.push(m);
    else others.push(m);
  });
  const byName = (a, b) => a.name.localeCompare(b.name);

  let html = controlsHtml();

  html += `<div class="team-section"><h3>${esc(roleView)} <span class="count">${assigned.length} assigned</span></h3>`;
  if (!assigned.length) {
    html += `<div class="idle-line">No teammates are assigned to <b>${esc(roleView)}</b>. Assign roles below or via Manage Teammates.</div>`;
  }
  assigned.sort(byName).forEach((m) => {
    html += memberRowHtml(m, pickFor(m.id), nowMs, domId("role", m.id));
  });
  html += `</div>`;

  if (missing.length) {
    html += `<div class="team-section"><h3>Missing Role Assignment <span class="count">${missing.length}</span></h3>`;
    missing.sort(byName).forEach((m) => { html += adminMemberRowHtml(m); });
    html += `</div>`;
  }

  if (others.length) {
    html += `<button class="more-toggle" id="showOthersToggle">${others.length} Teammates in Other Roles ${state.roleShowOthers ? "▾ Shown" : "▸ Hidden"}</button>`;
    if (state.roleShowOthers) {
      html += `<div class="team-section" style="margin-top:12px">`;
      others.sort(byName).forEach((m) => {
        const r = state.memberRoles[m.id];
        html += adminMemberRowHtml(m, `<span class="mention">${esc(r)}</span>`);
      });
      html += `</div>`;
    }
  }

  app.innerHTML = html;
  wireControls();
  wireTeamToggles();
  wireMemberRoles();

  const ot = document.getElementById("showOthersToggle");
  if (ot) ot.onclick = () => { state.roleShowOthers = !state.roleShowOthers; renderRoleManager(members, stories, nowMs); };
}

/* ---- Manage Teammates modal (rule #6) ---- */

function openManageModal() {
  const modal = document.getElementById("manageModal");
  if (!modal) return;
  const filter = document.getElementById("manageFilter");
  filter.value = "";
  renderManageList("");
  filter.oninput = () => renderManageList(filter.value);
  modal.classList.add("open");
  filter.focus();
}

function closeManageModal() {
  const modal = document.getElementById("manageModal");
  if (modal) modal.classList.remove("open");
}

function renderManageList(q) {
  const list = document.getElementById("manageList");
  if (!list) return;
  const term = (q || "").toLowerCase();
  const rows = state.members.filter((m) =>
    !term || m.name.toLowerCase().includes(term) || (m.mention_name || "").toLowerCase().includes(term));
  list.innerHTML = rows.length
    ? rows.map((m) =>
        `<div class="manage-row">
           <span class="who">${esc(m.name)}${m.mention_name ? `<span class="mention">@${esc(m.mention_name)}</span>` : ""}</span>
           ${memberRoleSelectHtml(m.id)}
         </div>`).join("")
    : `<div class="idle-line">No members match “${esc(q)}”.</div>`;
  wireMemberRoles(); // re-bind the (now newly-rendered) modal selects
}

function wireMemberRoles() {
  document.querySelectorAll("select.member-role[data-member]").forEach((sel) => {
    sel.onchange = () => {
      const id = sel.getAttribute("data-member");
      const v = sel.value;
      // Blank / "—" default means "use the global role": drop the override.
      if (!v) delete state.memberRoles[id];
      else state.memberRoles[id] = v;
      setStoredMemberRoles(state.memberRoles);
      refresh(true);
    };
  });
}

function wireTeamToggles() {
  document.querySelectorAll(".more-toggle[data-target]").forEach((btn) => {
    btn.onclick = () => {
      const ul = document.getElementById(btn.getAttribute("data-target"));
      if (!ul) return;
      const open = ul.style.display !== "none";
      ul.style.display = open ? "none" : "flex";
      const n = ul.children.length;
      btn.textContent = `${n} more assigned ${open ? "▸" : "▾"}`;
    };
  });
}

/* ---- API log tray (rule #9) — session-only, token redacted ---- */

let apiTrayOpen = false;
let apiTrayTimer = null;

/** Start/stop the live elapsed-time ticker: only runs while open AND in-flight. */
function apiTrayTicker() {
  const anyInflight = (state.apiLog || []).some((e) => e.status === null);
  if (apiTrayOpen && anyInflight) {
    if (!apiTrayTimer) apiTrayTimer = setInterval(apiTrayRender, 250);
  } else if (apiTrayTimer) {
    clearInterval(apiTrayTimer);
    apiTrayTimer = null;
  }
}

function apiTrayRender() {
  const tray = document.getElementById("apiTray");
  const handle = document.getElementById("apiTrayHandle");
  const body = document.getElementById("apiTrayBody");
  if (!tray || !handle || !body) return;

  const log = state.apiLog || [];
  const inflight = log.filter((e) => e.status === null).length;
  const stop = document.getElementById("apiStopBtn");
  if (stop) stop.hidden = inflight === 0;
  handle.innerHTML =
    `Shortcut API · ${log.length} call${log.length === 1 ? "" : "s"}` +
    (inflight ? ` · ${inflight} in-flight ⏱` : "") +
    ` <span class="chev">${apiTrayOpen ? "▾" : "▸"}</span>`;

  tray.classList.toggle("open", apiTrayOpen);
  if (apiTrayOpen) {
    const now = Date.now();
    body.innerHTML = log.length
      ? log.slice(0, 100).map((e) => {
          const ms = e.ms != null ? e.ms : now - e.startedAt;
          const cls = e.status === null ? "pending" : (e.status === "ERR" || (typeof e.status === "number" && e.status >= 400) ? "err" : "ok");
          const statusText = e.status === null ? "…" : e.status;
          return `
            <div class="api-row ${cls}">
              <span class="api-method">${esc(e.method)}</span>
              <span class="api-path" title="${esc(e.path)}${e.error ? " — " + esc(e.error) : ""}">${esc(e.path)}</span>
              <span class="api-status">${esc(String(statusText))}</span>
              <span class="api-ms">${ms}ms</span>
            </div>`;
        }).join("")
      : `<div class="idle-line">No API calls yet this session.</div>`;
  }
  apiTrayTicker();
}

/* ============================================================================
 * ORCHESTRATION
 * ========================================================================== */

async function refresh(manual) {
  const token = getToken();
  if (!token) return renderSetup();

  // Manual refresh (button / tab / role switch) clears a prior Stop and revives the poll.
  if (manual) { state.stopped = false; if (getToken()) startPolling(); }

  state.loading = true;
  renderMeta();
  try {
    // First successful load: identity + workspace lookups (fetched once per boot).
    if (!state.tokenMember) {
      state.tokenMember = await getMember(token);
      state.members = await getMembers(token);
      state.groups = (await getGroups(token))
        .filter((g) => String(g.default_workflow_id) === String(CONFIG.WORKFLOW_ID));
      state.tab = getStoredTab();               // validated; legacy MODE_KEY values ignored
      state.memberRoles = getStoredMemberRoles();
      state.teammateId = getStoredViewMemberId() || String(state.tokenMember.id);
      state.teamId = getStoredTeamId();
    }

    const workflows = await getWorkflows(token);

    // Scope role detection to the Development workflow only (matched by id, so
    // renames don't break it); build the flat state-name lookup globally so
    // chips can still label states from any workflow (both cheap).
    const devWorkflow = (workflows || []).find((w) => String(w.id) === String(CONFIG.WORKFLOW_ID)) || null;
    state.detectedRoles = detectRoles(devWorkflow ? [devWorkflow] : [], CONFIG.EXCLUDED_ROLES);
    state.stateNameById = buildStateNameById(workflows);

    // Resolve roles: stored → detected (+Planner) → first detected → COLUMN_PREFIX.
    const valid = new Set([...state.detectedRoles.roles, "Planner"]);
    const fallbackRole = state.detectedRoles.roles[0] || CONFIG.COLUMN_PREFIX;

    let myRole = state.myRole || getStoredRole();
    if (!valid.has(myRole)) myRole = fallbackRole;
    state.myRole = myRole;
    state.role = myRole;                         // canonical global fallback mirrors My Queue role
    setStoredRole(myRole);

    let roleView = state.roleView || getStoredRoleView();
    if (!valid.has(roleView)) roleView = fallbackRole;
    state.roleView = roleView;
    setStoredRoleView(roleView);

    const now = Date.now();
    clearError();

    // Run one search per distinct target state name, concat + dedupe by story id.
    const searchAcrossTargets = async (states, ownerPrefix) => {
      const all = [];
      for (const st of states) {
        const q = `${ownerPrefix}state:"${st.name}" !is:archived`;
        all.push(...await searchStories(token, q));
      }
      return [...new Map(all.map((s) => [s.id, s])).values()];
    };

    // Shared "no columns resolve" empty state.
    const noColumnsEmpty = (roleName) => {
      app.innerHTML = controlsHtml() + `
        <div class="empty">
          <div class="big">🧭</div>
          <div>No open column resolves for role "<b>${esc(roleName)}</b>".</div>
          <div class="muted" style="margin-top:6px">Pick a different role above, or check that your board has <code>${esc(roleName)} (Stage)</code> states.</div>
        </div>`;
      wireControls();
    };

    if (state.tab === "myqueue") {
      const targets = resolveTargets(state.detectedRoles, state.myRole);
      state.target = targets[0] || null;
      state.stateRank = stateRankFromTargets(targets);
      if (!targets.length) { noColumnsEmpty(state.myRole); state.lastRefreshed = now; return; }
      const me = state.tokenMember;
      state.viewMember = me;
      const stories = await searchAcrossTargets(targets, `owner:${me.mention_name} `);
      const pick = pickNextPaused(stories, me.id, targets, CONFIG.URGENT_LABEL);
      renderResult(pick.next, pick.queue, pick.paused, state.myRole, me, now);

    } else if (state.tab === "teammates") {
      const tm = currentTeammate();
      state.viewMember = tm;
      const role = state.memberRoles[tm.id] || state.role;
      const targets = resolveTargets(state.detectedRoles, role);
      state.target = targets[0] || null;
      if (!targets.length) { noColumnsEmpty(role); state.lastRefreshed = now; return; }
      const stories = await searchAcrossTargets(targets, `owner:${tm.mention_name} `);
      const pick = pickNextPaused(stories, tm.id, targets, CONFIG.URGENT_LABEL);
      renderResult(pick.next, pick.queue, pick.paused, role, tm, now);

    } else if (state.tab === "team") {
      // Union of target states across every assigned member role + the global
      // fallback (bounded by #roles, not #members). No per-member network calls.
      const unionRoles = new Set([state.role, ...Object.values(state.memberRoles)]);
      const unionById = new Map();
      unionRoles.forEach((r) => resolveTargets(state.detectedRoles, r)
        .forEach((st) => { if (!unionById.has(st.id)) unionById.set(st.id, st); }));
      const stories = await searchAcrossTargets([...unionById.values()], "");

      // Resolve the selected team; default to a "My team", else the first team,
      // else the "No team" bucket.
      const myId = state.tokenMember.id;
      const sortedGroups = state.groups.slice().sort((a, b) => a.name.localeCompare(b.name));
      let team = state.groups.find((g) => String(g.id) === String(state.teamId));
      if (!team && state.teamId === NO_TEAM_ID) {
        const grouped = new Set();
        state.groups.forEach((g) => g.member_ids.forEach((id) => grouped.add(id)));
        team = { id: NO_TEAM_ID, name: "No team", member_ids: state.members.filter((m) => !grouped.has(m.id)).map((m) => m.id) };
      }
      if (!team) team = sortedGroups.find((g) => g.member_ids.includes(myId)) || sortedGroups[0];
      if (team) { state.teamId = team.id; setStoredTeamId(team.id); }

      state.target = null;
      if (!team) {
        app.innerHTML = controlsHtml() + `<div class="empty"><div class="big">👥</div><div>No teams found in this workspace.</div></div>`;
        wireControls();
      } else {
        renderTeamManager(team, state.members, stories, now);
      }

    } else if (state.tab === "role") {
      const targets = resolveTargets(state.detectedRoles, state.roleView);
      state.target = targets[0] || null;
      if (!targets.length) { noColumnsEmpty(state.roleView); state.lastRefreshed = now; return; }
      const stories = await searchAcrossTargets(targets, "");
      renderRoleManager(state.members, stories, now);
    }

    state.lastRefreshed = now;
  } catch (e) {
    if (e.name === "AbortError" || state.stopped) return; // Stop button unwound the loop; leave the banner
    if (e.code === "AUTH") {
      renderSetup("Your token was rejected. Please paste a valid Shortcut API token.");
      return;
    }
    showError(e.message || String(e));
    if (manual || !state.lastRefreshed) {
      app.innerHTML = `<div class="empty"><div class="big">⚠️</div><div>Couldn't reach Shortcut.</div>
        <div class="muted" style="margin-top:6px">${esc(e.message || "")}</div></div>`;
    }
  } finally {
    state.loading = false;
    renderMeta();
  }
}

function startPolling() {
  stopPolling();
  pollTimer = setInterval(() => refresh(false), CONFIG.POLL_MS);
}
function stopPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = null;
}

async function boot() {
  clearError();
  if (!getToken()) { renderSetup(); return; }
  state.tokenMember = null;
  await refresh(true);
  if (getToken()) startPolling();
}

// Footer wiring
// NOTE: #footPrefix is set inside renderMeta() so it tracks the selected role.
document.getElementById("footPrefix").textContent = CONFIG.COLUMN_PREFIX; // seed until first render
document.getElementById("footUrgent").textContent = CONFIG.URGENT_LABEL;
document.getElementById("appVersion").textContent = `v${CONFIG.VERSION} · built ${formatBuildStamp(new Date(document.lastModified))}`;
document.getElementById("resetToken").addEventListener("click", (e) => {
  e.preventDefault();
  clearToken();
  boot();
});

// Manage Teammates modal: static open/close wiring (list is rendered on open).
document.getElementById("closeManage").addEventListener("click", closeManageModal);
document.getElementById("manageModal").addEventListener("click", (e) => {
  if (e.target.id === "manageModal") closeManageModal(); // click backdrop to dismiss
});
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeManageModal(); });

// API tray: toggle expand/collapse.
document.getElementById("apiTrayHandle").addEventListener("click", () => {
  apiTrayOpen = !apiTrayOpen;
  apiTrayRender();
});

// API tray: Stop execution — abort every in-flight fetch and halt the poll so it
// doesn't immediately re-storm. Resumes on manual Refresh / tab / role switch.
document.getElementById("apiStopBtn").addEventListener("click", () => {
  apiAbort.abort();                 // cancel every in-flight fetch
  apiAbort = new AbortController();  // fresh controller for future calls
  stopPolling();                    // don't let the 30s poll immediately re-storm
  state.stopped = true;
  state.loading = false;
  apiTrayRender();
  renderMeta();
  showError("Execution stopped. Switch tab/role or press Refresh to resume.");
});
apiTrayRender(); // seed the collapsed handle

// Refresh when tab regains focus so the queue is current when you come back.
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible" && getToken() && state.tokenMember) refresh(false);
});

boot();
</script>
</body>
</html>
